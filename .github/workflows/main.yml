name: Datame Auto-Scraper — Multi-Panel

on:
  schedule:
    - cron: '0 */2 * * *' # Cada 2 horas automáticamente
  workflow_dispatch: 
    inputs:
      start_date:
        description: 'Fecha Inicio (AAAA-MM-DD)'
        required: false
        default: ''
      end_date:
        description: 'Fecha Fin (AAAA-MM-DD)'
        required: false
        default: ''

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar Código
        uses: actions/checkout@v3

      - name: Preparar Entorno Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Instalar Playwright y Supabase
        run: |
          npm init -y
          npm install playwright @supabase/supabase-js
          npx playwright install --with-deps chromium
          
      - name: Ejecutar Extracción Multi-Panel
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          PANEL1_USER:          ${{ secrets.PANEL1_USER }}
          PANEL1_PASS:          ${{ secrets.PANEL1_PASS }}
          PANEL2_USER:          ${{ secrets.PANEL2_USER }}
          PANEL2_PASS:          ${{ secrets.PANEL2_PASS }}
          PANEL3_USER:          ${{ secrets.PANEL3_USER }}
          PANEL3_PASS:          ${{ secrets.PANEL3_PASS }}
          PANEL4_USER:          ${{ secrets.PANEL4_USER }}
          PANEL4_PASS:          ${{ secrets.PANEL4_PASS }}
          START_DATE:           ${{ github.event.inputs.start_date }}
          END_DATE:             ${{ github.event.inputs.end_date }}
        run: node scraper.js

      - name: Subir Evidencias (todos los paneles)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: debug_*.png
          retention-days: 3
