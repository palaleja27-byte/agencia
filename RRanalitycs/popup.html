<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - Agente RYR</title>
    <style>
        body { width: 280px; background-color: #0d0d12; color: #00ffcc; font-family: 'Courier New', Courier, monospace; padding: 15px; margin: 0; border: 1px solid #33ff33; }
        h2 { text-align: center; font-size: 16px; margin-top: 0; border-bottom: 1px dashed #00ffcc; padding-bottom: 10px; text-transform: uppercase; }
        .input-group { margin-bottom: 12px; }
        label { font-size: 11px; color: #aaa; display: block; margin-bottom: 4px; }
        input { width: 100%; background: #000; border: 1px solid #444; color: #fff; padding: 6px; box-sizing: border-box; font-family: monospace; }
        input:focus { border-color: #00ffcc; outline: none; }
        button { width: 100%; background: #00ffcc; color: #000; border: none; padding: 8px; font-weight: bold; cursor: pointer; margin-top: 5px; transition: all 0.2s; }
        button:hover { background: #33ff33; }
        #status-msg { margin-top: 10px; font-size: 10px; text-align: center; min-height: 14px; }
        .info-panel { background: #111; padding: 8px; margin-top: 15px; border-radius: 4px; font-size: 10px; color: #888; text-align: center; }
    </style>
</head>
<body>
    <h2>⚡ AGENTE RYR V10 ⚡</h2>
    <div id="login-form">
        <div class="input-group">
            <label>USUARIO (ID Operador)</label>
            <input type="text" id="username" placeholder="Ej: admin">
        </div>
        <div class="input-group">
            <label>CONTRASEÑA</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>
        <button id="btn-login">INICIAR TURNO</button>
    </div>
    <div id="status-msg">Esperando credenciales...</div>
    <div class="info-panel" id="panel-activo" style="display: none;">
        <span style="color: #33ff33;">🟢 CONECTADO A LA MATRIZ</span><br>
        Operador: <strong id="op-name" style="color: #fff;">-</strong><br>
        <button id="btn-logout" style="background: #ff4d4d; color: white; margin-top: 10px;">CERRAR TURNO</button>
    </div>
    <script src="popup.js"></script>
</body>
</html>
