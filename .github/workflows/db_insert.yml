name: Insert Missing Database Profiles

on:
  push:
    paths:
      - '.github/workflows/db_insert.yml'
      - 'scripts/insert_profiles_prod.js'
  workflow_dispatch:

jobs:
  db-insert:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:

      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies and Run
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          rm -f package.json package-lock.json
          npm init -y
          npm install @supabase/supabase-js
          node scripts/insert_profiles_prod.js
          node scripts/write_perfiles_status.js

      - name: Commit and Push Status Report
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add perfiles_status.md
          git commit -m "chore(database): update perfiles_status.md report [skip ci]" || echo "No changes to commit"
          git push



