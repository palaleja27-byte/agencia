name: Tableau Cloud Sync

on:
  push:
    branches:
      - main
  schedule:
    - cron: '*/30 * * * *' # Cada 30 minutos
  workflow_dispatch: # Permite correrlo manualmente

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install pandas requests supabase

      - name: Run Tableau Sync
        env:
          TABLEAU_TOKEN_SECRET: ${{ secrets.TABLEAU_TOKEN_SECRET }}
          TABLEAU_TOKEN_SECRET_2: ${{ secrets.TABLEAU_TOKEN_SECRET_2 }}
          TABLEAU_TOKEN_SECRET_3: ${{ secrets.TABLEAU_TOKEN_SECRET_3 }}
          TABLEAU_TOKEN_SECRET_4: ${{ secrets.TABLEAU_TOKEN_SECRET_4 }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/tableau_sync.py
